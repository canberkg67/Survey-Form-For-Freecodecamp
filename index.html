<!DOCTYPE html>
<html lang="en">
<head>
    <title>Survey Form</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1 id="title">A Survey About Sports</h1>
    <p id="description">This survey is made for collecting people's ideas and opinions about sports.</p>
    <form>
        <fieldset>
            <label for="">Name:
                <input type="text">
            </label>
            
            <label for="">Email:
                <input type="text">
            </label>

            <label for="">Age:
                <input type="text">
            </label>

            <label for="">Name the sport that you are most interested in:
                <input type="text">
            </label>
        </fieldset>

        <fieldset>
            <label for="">Do you think all people who is able have to do some kind of sport?
                <input type="radio">Yes
                <input type="radio">No
                <input type="radio">No Idea
            </label>
        </fieldset>

        <fieldset>
            <label for="">Do you have any favourite team or person in a sport?
                <input type="text">
            </label>
        </fieldset>

        <fieldset>
            <label for="">Which sports in below do you interested in?
                <input type="checkbox">Football-Soccer
                <input type="checkbox">Basketball
                <input type="checkbox">Volleyball
                <input type="checkbox">Tennis
                <input type="checkbox">Baseball
                <input type="checkbox">Hockey
                <input type="checkbox">F1
                <input type="checkbox">American Football
                <input type="checkbox">Swimming
                <input type="checkbox">Boxing
                <input type="checkbox">Fitness-Bodybuilding

            </label>
        </fieldset>

        <fieldset>
            <label for="">Explain the reason why do you like the sport you are doing and how you benefit from it?
                <textarea></textarea>
            </label>
        </fieldset>

        <input type="submit">
    </form>


</body>

</html>
